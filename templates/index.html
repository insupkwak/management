      <h1>Vessel Position & Report</h1>
      <p>선박 위치, 현안업무, COC, Sire Vetting, Report 파일을 통합 관리합니다.</p>






    <div class="card">
  <h2>선박 정보 입력</h2>

  <form id="vesselForm">
    <div class="form-accordion">

      <!-- 1. 선박정보입력 -->
      <div class="accordion-section">
        <button type="button" class="accordion-toggle">선박정보입력</button>
        <div class="accordion-content">
          <label for="vesselName">선박명</label>
          <input id="vesselName" type="text" required />

          <label for="vesselType">Type of Vessel</label>
          <select id="vesselType" name="vesselType">
            <option value="Tanker">Tanker</option>
            <option value="Container">Container</option>
          </select>

          <label for="size">Size</label>
          <input id="size" type="text" />

          <label for="managementCompany">관리사</label>
          <input id="managementCompany" type="text" />

          <label for="managementSupervisor">관리사감독</label>
          <input id="managementSupervisor" type="text" />

          <label for="operationManager">운항담당자</label>
          <input id="operationManager" type="text" />

          <label for="ownerSupervisor">선주감독</label>
          <input
            type="text"
            id="ownerSupervisor"
            name="ownerSupervisor"
            placeholder="선주감독 입력"
          />

          <label for="teamName">담당팀</label>
          <select id="teamName">
            <option value="">선택</option>
            <option value="TRMT1">TRMT1</option>
            <option value="TRMT2">TRMT2</option>
            <option value="TRMT3 & CMT2">TRMT3 & CMT2</option>
          </select>

          <label for="builder">Builder</label>
          <input id="builder" type="text" />

          <label for="deliveryDate">Delivery Date</label>
          <input id="deliveryDate" class="date-field" type="text" placeholder="날짜" data-date-input />

          <label for="nextDryDock">Next Dry dock</label>
          <input id="nextDryDock" class="date-field" type="text" placeholder="날짜" data-date-input />

          <label for="voyagePlan">항차계획</label>
          <input id="voyagePlan" type="text" />

          <div id="cargoStatusWrap">
            <label for="cargoStatus">Cargo Loading 상태</label>
            <select id="cargoStatus">
              <option value="Loading">Loading</option>
              <option value="Ballast">Ballast</option>
            </select>
          </div>
        </div>
      </div>

      <!-- 4. Sire Vetting 정보 -->
      <div class="accordion-section" id="sireSectionWrap">
        <button type="button" class="accordion-toggle">Sire Vetting 정보</button>
        <div class="accordion-content" id="sireSection">
          <div class="sire-block">
            <div class="sire-row">
              <div class="sire-row-top">
                <input id="sireType1" type="text" placeholder="Sire 종류" />
                <input id="sireDate1" class="date-field" type="text" placeholder="날짜" data-date-input />
                <select id="sireStatus1">
                  <option value="">선택</option>
                  <option value="예정">예정</option>
                  <option value="결함조치 중">결함조치 중</option>
                  <option value="수검완료">수검완료</option>
                </select>
              </div>
              <div class="sire-row-bottom">
                <input id="sireFindings1" type="number" min="0" placeholder="지적사항 몇건" />
                <input id="sireOpenFindings1" type="number" min="0" placeholder="잔여지적사항 몇건" />
              </div>
              <div class="input-row">
                <input id="sireRemark1" placeholder="특이사항">
              </div>
            </div>

            <div class="sire-row">
              <div class="sire-row-top">
                <input id="sireType2" type="text" placeholder="Sire 종류" />

            </div>

            <div class="cost-divider"></div>

            <div class="cost-row cost-row-year">
              <div class="cost-label">년도</div>
              <select id="opexContractYear">
                <option value="">년도 선택</option>
                <option value="2024">2024</option>
                <option value="2025">2025</option>
                <option value="2026">2026</option>
                <option value="2027">2027</option>
                <option value="2028">2028</option>

            </div>

            <div class="cost-divider"></div>

            <div class="cost-group">

              <div class="cost-row cost-row-4">

                <input id="opexActualCrewCount" type="number" min="0" placeholder="건" />

              </div>
              <div class="cost-row cost-row-4">
                <div class="cost-type">Tech</div>

                <input id="opexActualTechAmount" type="text" placeholder="금액" />

              <div class="cost-subtitle">AOR</div>

                <input id="aorActualCrewCount" type="number" min="0" placeholder="건" />
                <input id="aorActualCrewAmount" type="text" placeholder="금액" />
              </div>
              <div class="cost-row cost-row-4">

                <input id="aorActualTechCount" type="number" min="0" placeholder="건" />

            </div>

            <div class="cost-divider"></div>

              <div class="cost-row cost-row-4">

          <input id="latitude" type="number" step="any" />

          <label for="longitude">경도</label>
          <input id="longitude" type="number" step="any" />
        </div>
      </div>

    </div>

    <button type="submit">저장</button>
    <button type="button" id="resetBtn" class="btn-secondary">초기화</button>
  </form>

        <div class="report-topbar">

<div class="report-link-grid">
  <button type="button" id="issueReportBtn" class="report-view-btn">현안업무</button>
  <button type="button" id="cocReportBtn" class="report-view-btn">COC</button>
  <button type="button" id="sireReportBtn" class="report-view-btn">SIRE</button>
  <button type="button" id="conditionReportBtn" class="report-view-btn">CONDITION</button>
  <button type="button" id="managementCostReportBtn" class="report-view-btn">관리사 비용</button>
</div>



<button type="button" id="positionUpdateBtn" class="btn-secondary report-upload-btn">위치 Excel 업로드</button>
<input id="positionExcelInput" type="file" accept=".xlsx" hidden />
<input id="reportFileInput" type="file" accept=".pdf,.jpg,.jpeg,.png,.webp,.doc,.docx,.xls,.xlsx" hidden />

<button type="button" id="managementCostUploadBtn" class="position-upload-btn">
  관리사 비용 Excel 업로드
</button>
<input

/>

      <div class="card">
        <h2>선박 리스트</h2>
        <div id="vesselList" class="vessel-list"></div>

    <main class="map-wrap" id="mapWrap">
      <div id="map"></div>
      <div id="labelLayer" class="label-layer"></div>

 <div class="map-toolbar">

  <div class="search-box">
    <input id="shipSearchInput" type="text" placeholder="선박 검색" autocomplete="off" />
    <div id="shipSearchDropdown" class="search-dropdown"></div>
  </div>

  <!-- 전체 -->
  <button type="button" id="filterAllBtn" class="toolbar-chip-btn active">
    <span class="toolbar-chip-label">전체선박</span>
    <span class="toolbar-chip-value" id="countAll">0척</span>
  </button>

  <!-- VLCC -->
  <button type="button" id="filterVlccBtn" class="toolbar-chip-btn">
    <span class="toolbar-chip-label">VLCC</span>
    <span class="toolbar-chip-value" id="countVlcc">0척</span>
  </button>

  <!-- SIRE 진행 -->
  <button type="button" id="filterSireProgressBtn" class="toolbar-chip-btn">
    <span class="toolbar-chip-label">SIRE 진행 중</span>
    <span class="toolbar-chip-value" id="countSireProgress">0척</span>
  </button>

  <!-- TRMT1 -->
  <button type="button" id="filterTrmt1Btn" class="toolbar-chip-btn">
    <span class="toolbar-chip-label">TRMT1</span>
    <span class="toolbar-chip-value" id="countTrmt1">0척</span>
  </button>

  <!-- TRMT2 -->
  <button type="button" id="filterTrmt2Btn" class="toolbar-chip-btn">
    <span class="toolbar-chip-label">TRMT2</span>
    <span class="toolbar-chip-value" id="countTrmt2">0척</span>
  </button>

  <!-- CMT2 & TRMT3 -->
  <button type="button" id="filterCmt2Btn" class="toolbar-chip-btn">
    <span class="toolbar-chip-label">CMT2</span>
    <span class="toolbar-chip-value" id="countCmt2">0척</span>
  </button>

  <!-- COC -->
  <button type="button" id="filterCocBtn" class="toolbar-chip-btn">
    <span class="toolbar-chip-label">COC 1개월</span>
    <span class="toolbar-chip-value" id="countCoc">0척</span>
  </button>

  <!-- Critical -->
  <button type="button" id="filterCriticalBtn" class="toolbar-chip-btn">
    <span class="toolbar-chip-label">Critical</span>
    <span class="toolbar-chip-value" id="countCritical">0척</span>
  </button>

  <!-- 감독 -->
  <button type="button" id="filterSonBtn" class="toolbar-chip-btn">
    <span class="toolbar-chip-label">손유석</span>
    <span class="toolbar-chip-value" id="countSon">0척</span>

  <button type="button" id="filterKimBtn" class="toolbar-chip-btn">

  <button type="button" id="filterLeeBtn" class="toolbar-chip-btn">

</div>


<div id="customAlert" class="custom-alert-overlay hidden">
  <div class="custom-alert-box">
    <div class="custom-alert-title">알림</div>
    <div id="customAlertMessage" class="custom-alert-message"></div>
    <div class="custom-alert-actions">
      <button type="button" id="customAlertOkBtn" class="custom-alert-ok">확인</button>
    </div>
  </div>
</div>


<div id="costReportModal" class="custom-alert-overlay hidden">
  <div class="custom-alert-box cost-report-modal-box">
    <div class="custom-alert-title">관리사 비용 Report 선택</div>

    <div class="custom-alert-message cost-report-modal-body">
      <label for="costReportYear">1. 년도</label>
      <select id="costReportYear" class="cost-report-select">
        <option value="2024">2024</option>
        <option value="2025">2025</option>
        <option value="2026" selected>2026</option>
        <option value="2027">2027</option>
        <option value="2028">2028</option>
      </select>

      <!-- 🔥 변경 1 -->
      <label for="costReportRange">2. 범위 (전체 / OPEX / AOR)</label>
      <select id="costReportRange" class="cost-report-select">
        <option value="전체" selected>전체</option>
        <option value="OPEX">OPEX</option>
        <option value="AOR">AOR</option>
      </select>

      <!-- 🔥 변경 2 -->
      <label for="costReportView">3. 구분 (전체 / Crew / Tech)</label>
      <select id="costReportView" class="cost-report-select">
        <option value="전체" selected>전체</option>
        <option value="Crew">Crew</option>
        <option value="Tech">Tech</option>
      </select>
    </div>

    <div class="custom-alert-actions">
      <button type="button" id="costReportCancelBtn" class="custom-alert-ok cost-report-cancel-btn">취소</button>
      <button type="button" id="costReportConfirmBtn" class="custom-alert-ok">확인</button>
    </div>
  </div>
</div>
